<div class="fortune-carousel-container">
    <div class="fortune-carousel">
        
        {{ range .Site.Params.citazioni }}
        <div class="quote-slide">
            <p class="quote-text">“{{ .testo }}”</p>
            <p class="quote-author">{{ .autore }}</p>
        </div>
        {{ end }}
        
    </div>
</div>

<style>
.fortune-carousel-container {
    background-color: #111827 !important;
    border-left: 4px solid #3b82f6 !important;
    padding: 2rem !important;
    margin: 2rem 0 !important;
    border-radius: 8px !important;
    min-height: 140px !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    position: relative !important;
    overflow: hidden !important;
}

.fortune-carousel {
    width: 100% !important;
    text-align: center !important;
    position: relative !important;
}

.quote-slide {
    display: none;
    animation: fadeInFortune 0.8s ease-in-out;
}

.quote-slide.active {
    display: block !important;
}

.quote-text {
    font-size: 1.15rem !important;
    font-style: italic !important;
    color: #f3f4f6 !important;
    line-height: 1.6 !important;
    margin-bottom: 0.5rem !important;
    font-weight: 500 !important;
}

.quote-author {
    font-size: 0.85rem !important;
    color: #9ca3af !important;
    text-transform: uppercase !important;
    letter-spacing: 0.05em !important;
    margin: 0 !important;
}

@keyframes fadeInFortune {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // Trasformiamo la NodeList dei nodi in un array vero e proprio
    const slides = Array.from(document.querySelectorAll('.quote-slide'));
    if (slides.length === 0) return;
    
    // Funzione Algoritmo di Fisher-Yates per mescolare l'ordine dei blocchi
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // Mescoliamo l'ordine dell'array delle citazioni
    const shuffledSlides = shuffle(slides);
    let currentSlide = 0;

    // Mostriamo subito la prima citazione dell'elenco mescolato (che sarà sempre random)
    shuffledSlides[currentSlide].classList.add('active');

    function nextRandomSlide() {
        // Rimuoviamo il focus dalla citazione corrente
        shuffledSlides[currentSlide].classList.remove('active');
        
        // Passiamo alla successiva nell'elenco mescolato. Se finiscono, ricomincia il ciclo mescolato
        currentSlide = (currentSlide + 1) % shuffledSlides.length;
        
        // Attiviamo la nuova citazione
        shuffledSlides[currentSlide].classList.add('active');
    }

    // Cambia citazione random ogni 5 secondi
    setInterval(nextRandomSlide, 5000);
});
</script>
