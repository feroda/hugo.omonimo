<!-- layouts/partials/rating.html -->
<div class="mt-8 pt-4 border-t border-neutral-200 dark:border-neutral-800">
    <h3 class="text-lg font-bold mb-2">Ti è piaciuto questo articolo? Votalo!</h3>
    
    <!-- Contenitore fisico dove appariranno le stelle -->
    <div id="wp-rating-container"></div>
</div>

<script type="text/javascript">
    // Configurazione del widget
    wp_rating_config = [{
        id: "IL_TUO_SITE_ID_QUI", // <-- Sostituisci questo testo con il tuo ID numerico di Widgetpack
        id_page: "{{ .Permalink }}", // Hugo inserisce automaticamente l'URL unico del post
        container: "wp-rating-container"
    }];

    // Script JavaScript nativo per caricare il widget in modo asincrono
    (function(d, s, id) {
        var js, fjs = d.getElementsByTagName(s)[0];
        if (d.getElementById(id)) return;
        js = d.createElement(s); js.id = id;
        js.async = true;
        js.src = "https://embed.widgetpack.com/rating/embed.js";
        fjs.parentNode.insertBefore(js, fjs);
    }(document, "script", "widgetpack-rating"));
</script>
