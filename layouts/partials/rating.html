<!-- layouts/partials/rating.html -->
<div class="bg-neutral-100 dark:bg-neutral-800 p-6 rounded-lg my-8 shadow-sm">
    <div id="custom-rating-widget" class="text-right">
        
        <h4 class="text-lg font-bold text-neutral-800 dark:text-neutral-100 mb-1">
            Valuta questo articolo
        </h4>
        
        <!-- Stringa dinamica che mostrerà la media recuperata da Firebase -->
        <p id="rating-summary" class="text-xs text-neutral-500 dark:text-neutral-400 mb-2">
            Caricamento valutazioni...
        </p>

        <!-- Contenitore grafico delle 5 stelle -->
        <div class="space-x-2 mb-2i text-right">
            {{ range seq 5 }}
            <button class="star-button text-neutral-400 hover:text-amber-400 transition-colors duration-200 focus:outline-none" 
                    data-star-value="{{ . }}" 
                    aria-label="Vota {{ . }} stelle">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-8 h-8 pointer-events-none">
                    <path fill-rule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.006 5.404.434c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.434 2.082-5.005Z" clip-rule="evenodd" />
                </svg>
            </button>
            {{ end }}
        </div>
        
        <p id="rating-status-message" class="text-sm text-neutral-600 dark:text-neutral-400 mb-4">
            Ti è piaciuto questo post? Lascia il tuo voto!
        </p>
        

    </div>
</div>

<!-- Caricamento dei moduli SDK Firebase (Versione 10+ Modular) -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 1. Configurazione di Firebase: Sostituisci questi dati con le tue chiavi della Console
    const firebaseConfig = {
        apiKey: "AIzaSyApZyFR3ldaz9cGKBhOKEM9Qk6XX4Pxfow",
        authDomain: "rating-hugo.firebaseapp.com",
        projectId: "rating-hugo",
        storageBucket: "rating-hugo.firebasestorage.app",
        messagingSenderId: "1093779456120",
        appId: "1:1093779456120:web:8f25f8036e96c4cc23ad8d",
        measurementId: "G-8G9VWV59GE"
    };

// Inizializzazione dei servizi Cloud
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Eseguiamo il codice solo quando l'HTML è completamente pronto nel browser
    document.addEventListener("DOMContentLoaded", async function () {
        // Selezione degli elementi della pagina
        const buttons = document.querySelectorAll(".star-button");
        const statusText = document.getElementById("rating-status-message");
        const summaryText = document.getElementById("rating-summary");
        
        // Generazione di un ID pulito e sicuro per il documento Firebase
        let pathName = window.location.pathname;
        // Trasforma gli slash "/" in trattini "-" per evitare errori di percorso su Firebase
        let currentPostId = pathName.replace(/\//g, "-").replace(/^-|-$/g, "");
        if (!currentPostId || currentPostId === "") {
            currentPostId = "home";
        }
        
        const storageKey = "has_voted_" + pathName;
        const docRef = doc(db, "ratings", currentPostId);

        // Funzione per colorare le icone delle stelle in oro
        function colorizeStars(limit) {
            buttons.forEach(btn => {
                const btnValue = parseInt(btn.getAttribute("data-star-value"));
                if (btnValue <= limit) {
                    btn.classList.remove("text-neutral-400");
                    btn.classList.add("text-amber-400");
                } else {
                    btn.classList.remove("text-amber-400");
                    btn.classList.add("text-neutral-400");
                }
            });
        }

        // Funzione per bloccare i pulsanti dopo il voto
        function applySavedVote(vote) {
            colorizeStars(parseInt(vote));
            buttons.forEach(btn => {
                btn.disabled = true;
                btn.classList.remove("hover:text-amber-400");
                btn.style.cursor = "default";
            });
            statusText.innerText = "Grazie per il tuo feedback!";
            statusText.classList.add("text-emerald-600", "dark:text-emerald-400", "font-medium");
        }

        // FASE A: RECUPERO DATI ALL'AVVIO
        try {
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                const avg = data.voteCount > 0 ? (data.totalStars / data.voteCount).toFixed(1) : 0;
                summaryText.innerText = `Media: ${avg} / 5 stelle (${data.voteCount} votazioni)`;
            } else {
                summaryText.innerText = "Nessuna valutazione per questo articolo. Sii il primo!";
            }
        } catch (error) {
            console.error("Errore avvio:", error);
            summaryText.innerText = "Valutazioni non disponibili al momento";
        }

        // Se l'utente ha già votato in precedenza questo specifico post, blocca subito il widget
        const localVote = localStorage.getItem(storageKey);
        if (localVote) {
            applySavedVote(localVote);
            return; // Interrompe l'esecuzione così non attiva i click
        }

        // FASE B: GESTIONE EFFETTI VISIVI (HOVER)
        buttons.forEach(button => {
            button.addEventListener("mouseenter", function () {
                const currentHoverValue = parseInt(this.getAttribute("data-star-value"));
                colorizeStars(currentHoverValue);
            });
        });

        // Ripristina lo stato grigio quando il mouse esce dal blocco delle stelle
        const starContainer = document.querySelector(".flex.justify-center.space-x-2");
        if (starContainer) {
            starContainer.addEventListener("mouseleave", function () {
                colorizeStars(0);
            });
        }

        // FASE C: LOGICA DEL CLICK E INVIO A FIREBASE
        buttons.forEach(button => {
            button.addEventListener("click", async function (event) {
                event.preventDefault(); // Impedisce comportamenti anomali del pulsante
                
                const selectedVote = parseInt(this.getAttribute("data-star-value"));
                if (isNaN(selectedVote)) return;

                // Salviamo immediatamente la scelta nel browser per evitare click multipli distruttivi
                localStorage.setItem(storageKey, selectedVote);
                applySavedVote(selectedVote);
                summaryText.innerText = "Invio del voto al server in corso...";

                try {
                    const docSnap = await getDoc(docRef);
                    
                    if (!docSnap.exists()) {
                        // Primo voto in assoluto per questo articolo
                        await setDoc(docRef, {
                            totalStars: selectedVote,
                            voteCount: 1
                        });
                    } else {
                        // Aggiornamento atomico incrementale per evitare sovrascritture di rete
                        await updateDoc(docRef, {
                            totalStars: increment(selectedVote),
                            voteCount: increment(1)
                        });
                    }
                    
                    // Rileggiamo i dati aggiornati per mostrare la nuova media corretta
                    const updatedSnap = await getDoc(docRef);
                    const data = updatedSnap.data();
                    const avg = (data.totalStars / data.voteCount).toFixed(1);
                    summaryText.innerText = `Media: ${avg} / 5 stelle (${data.voteCount} votazioni)`;
                    
                } catch (error) {
                    console.error("Errore durante l'invio del voto:", error);
                    statusText.innerText = "Errore di connessione durante il salvataggio.";
                    statusText.classList.remove("text-emerald-600");
                    statusText.classList.add("text-red-500");
                    localStorage.removeItem(storageKey); // Riapre il voto localmente se fallisce sul server
                }
            });
        });
    });
</script>
