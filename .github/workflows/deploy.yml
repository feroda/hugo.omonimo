name: Compila e Pubblica il Blog via SSH

on:
  push:
    branches:
      - main  # Cambia in 'master' se il tuo ramo principale si chiama così

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Scarica il codice del blog dal repository
    - name: Checkout del codice
      uses: actions/checkout@v4
      with:
        submodules: recursive  # Fondamentale se usi temi come Congo come sottomoduli Git
        fetch-depth: 0

    # 2. Installa Hugo nell'ambiente virtuale
    - name: Configura Hugo
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: 'latest'
        extended: true # Sfrutta la versione extended (richiesta da molti temi come Congo)

    # 3. Compila il sito (genera la cartella public al volo)
    - name: Compila il sito con Hugo
      run: hugo --gc --minify

    # 4. Deploy sul Server usando i comandi nativi Linux (Rsync + SSH)
    - name: Deploy sul Server via SSH (Nativo)
      env:
        SSH_KEY: ${{ secrets.SSH_KEY }}
        HOST: ${{ secrets.SSH_HOST }}
        USER: ${{ secrets.SSH_USER }}
        PORT: ${{ secrets.SSH_PORT }}
      run: |
        # 1. Crea la cartella .ssh e configura la chiave privata
        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/id_ecdsa
        chmod 600 ~/.ssh/id_ecdsa
        
        # 2. Disabilita il controllo stretto dell'host per evitare blocchi interattivi
        echo -e "Host *\n\tStrictHostKeyChecking no\nPort $PORT" > ~/.ssh/config
        
        # 3. Esegui RSYNC nativo forzando la porta corretta
        rsync -rlptgoDzvO --delete public/ $USER@$HOST:/var/www/home_lf/
    # 5. Invalida la cache di Cloudflare automaticamente dopo il deploy
    - name: Svuota Cache Cloudflare
      env:
        ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        AUTH_KEY: ${{ secrets.CLOUDFLARE_AUTH_KEY }}
        # Se usi un API Token dedicato metti "Authorization: Bearer $AUTH_KEY" 
        # Se usi la Global API Key classica usa i due header sotto:
        AUTH_EMAIL: "la-tua-email@email.com" # Sostituisci con la tua email di Cloudflare
      run: |
        curl -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
        -H "X-Auth-Email: $AUTH_EMAIL" \
        -H "X-Auth-Key: $AUTH_KEY" \
        -H "Content-Type: application/json" \
        --data '{"purge_everything":true}'