name: Compila e Pubblica il Blog via SSH

on:
  push:
    branches:
      - main  # Cambia in 'master' se il tuo ramo principale si chiama così

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Scarica il codice del blog dal repository
    - name: Checkout del codice
      uses: actions/checkout@v4
      with:
        submodules: recursive  # Fondamentale se usi temi come Congo come sottomoduli Git
        fetch-depth: 0

    # 2. Installa Hugo nell'ambiente virtuale
    - name: Configura Hugo
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: 'latest'
        extended: true # Sfrutta la versione extended (richiesta da molti temi come Congo)

    # 3. Compila il sito (genera la cartella public al volo)
    - name: Compila il sito con Hugo
      run: hugo --gc --minify

      # 4. Deploy sul Server usando i comandi nativi Linux (Rsync + SSH)
    - name: Deploy sul Server via SSH (Nativo)
      env:
        SSH_KEY: ${{ secrets.SSH_KEY }}
        HOST: ${{ secrets.SSH_HOST }}
        USER: ${{ secrets.SSH_USER }}
        PORT: ${{ secrets.SSH_PORT }}
      run: |
        # 1. Crea la cartella .ssh e configura la chiave privata
        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/id_ecdsa
        chmod 600 ~/.ssh/id_ecdsa
        
        # 2. Disabilita il controllo stretto dell'host per evitare blocchi interattivi
        echo -e "Host *\n\tStrictHostKeyChecking no\n" > ~/.ssh/config
        
        # 3. Esegui RSYNC nativo forzando la porta corretta
        rsync -rlptgoDzvO --delete -e "ssh -p $PORT" public/ $USER@$HOST:/var/www/home_lf/